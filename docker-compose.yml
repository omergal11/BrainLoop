services:
  mysql:
    image: mysql:8.0
    container_name: brainloop_mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-rootpassword}
      MYSQL_DATABASE: brainloop
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./db/brainloop.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - brainloop_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: brainloop_backend
    environment:
      DB_TYPE: mysql
      MYSQL_HOST: mysql
      MYSQL_USER: root
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-rootpassword}
      MYSQL_DB: brainloop
      SECRET_KEY: ${SECRET_KEY:-change-this-in-production}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
    ports:
      - "8000:8000"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - brainloop_network
    restart: unless-stopped
    command: sh -c "echo 'Waiting for MySQL...' && sleep 10 && uvicorn main:app --host 0.0.0.0 --port 8000 --reload"

  frontend:
    build:
      context: ./frontend/frontend
      dockerfile: Dockerfile
    container_name: brainloop_frontend
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend/frontend:/app
      - /app/node_modules
    networks:
      - brainloop_network
    restart: unless-stopped
    command: sh -c "npm run dev -- --host 0.0.0.0"

volumes:
  mysql_data:

networks:
  brainloop_network:
    driver: bridge
